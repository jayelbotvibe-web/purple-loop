name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build
        run: go build ./cmd/... ./internal/...
      - name: vet
        run: go vet ./cmd/... ./internal/...
      - name: test
        run: go test ./internal/... -count=1
  detections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: sigma lint
        run: |
          pip install pyyaml
          python3 scripts/lint-sigma.py
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
  # Phase 3 adds a `detections` job: sigma lint + regression vs fixtures.
