name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build
        run: go build ./cmd/... ./internal/...
      - name: vet
        run: go vet ./cmd/... ./internal/...
      - name: test
        run: go test ./internal/... -count=1
  detections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: sigma lint
        run: |
          pip install pyyaml
          python3 scripts/lint-sigma.py
      - name: fixture regression
        run: python3 scripts/regression-test.py
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks scan
        env:
          GITLEAKS_VERSION: 8.28.0
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks dir . --config .gitleaks.toml --redact --no-banner --exit-code 1
  # Phase 3 adds a `detections` job: sigma lint + regression vs fixtures.
