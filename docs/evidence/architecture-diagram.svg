<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="system-ui,sans-serif" font-size="13">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="900" height="320" fill="#0d1117"/>
  <text x="450" y="25" fill="#58a6ff" font-size="18" font-weight="bold" text-anchor="middle">Purple Loop — Core Architecture</text>

  <!-- threat-intel-arbiter -->
  <rect x="20" y="50" width="150" height="80" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="95" y="78" fill="#58a6ff" font-size="14" font-weight="bold" text-anchor="middle">threat-intel</text>
  <text x="95" y="96" fill="#58a6ff" font-size="14" font-weight="bold" text-anchor="middle">arbiter</text>
  <text x="95" y="118" fill="#8b949e" font-size="11" text-anchor="middle">CISA KEV + MISP</text>

  <!-- arrow -->
  <text x="185" y="95" fill="#3fb950" font-size="22" text-anchor="middle">→</text>

  <!-- Feed -->
  <rect x="200" y="50" width="110" height="80" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
  <text x="255" y="78" fill="#79c0ff" font-size="13" font-weight="bold" text-anchor="middle">Feed</text>
  <text x="255" y="100" fill="#8b949e" font-size="10" text-anchor="middle">StaticFeed</text>
  <text x="255" y="116" fill="#8b949e" font-size="10" text-anchor="middle">ArbiterFeed</text>

  <text x="325" y="95" fill="#3fb950" font-size="22" text-anchor="middle">→</text>

  <!-- Execute -->
  <rect x="340" y="50" width="110" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="395" y="78" fill="#3fb950" font-size="13" font-weight="bold" text-anchor="middle">Execute</text>
  <text x="395" y="100" fill="#8b949e" font-size="10" text-anchor="middle">DockerExecutor</text>
  <text x="395" y="116" fill="#8b949e" font-size="10" text-anchor="middle">SSHExecutor</text>

  <text x="465" y="95" fill="#3fb950" font-size="22" text-anchor="middle">→</text>

  <!-- Collect -->
  <rect x="480" y="50" width="110" height="80" rx="8" fill="#161b22" stroke="#d2991d" stroke-width="2"/>
  <text x="535" y="78" fill="#d2991d" font-size="13" font-weight="bold" text-anchor="middle">Collect</text>
  <text x="535" y="100" fill="#8b949e" font-size="10" text-anchor="middle">WazuhCollector</text>
  <text x="535" y="116" fill="#8b949e" font-size="10" text-anchor="middle">archives.json</text>

  <text x="605" y="95" fill="#3fb950" font-size="22" text-anchor="middle">→</text>

  <!-- Evaluate -->
  <rect x="620" y="50" width="110" height="80" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
  <text x="675" y="78" fill="#bc8cff" font-size="13" font-weight="bold" text-anchor="middle">Evaluate</text>
  <text x="675" y="100" fill="#8b949e" font-size="10" text-anchor="middle">RuleMatcher</text>
  <text x="675" y="116" fill="#8b949e" font-size="10" text-anchor="middle">Normalizer</text>

  <text x="745" y="95" fill="#3fb950" font-size="22" text-anchor="middle">→</text>

  <!-- Report -->
  <rect x="760" y="50" width="120" height="80" rx="8" fill="#161b22" stroke="#f85149" stroke-width="2"/>
  <text x="820" y="78" fill="#f85149" font-size="13" font-weight="bold" text-anchor="middle">Report</text>
  <text x="820" y="100" fill="#8b949e" font-size="10" text-anchor="middle">JSON/HTML</text>
  <text x="820" y="116" fill="#8b949e" font-size="10" text-anchor="middle">ATT&amp;CK Nav</text>

  <!-- Lab section -->
  <text x="450" y="175" fill="#58a6ff" font-size="16" font-weight="bold" text-anchor="middle">Lab Infrastructure</text>
  
  <rect x="100" y="190" width="300" height="60" rx="8" fill="#161b22" stroke="#d2991d" stroke-width="2"/>
  <text x="250" y="215" fill="#d2991d" font-size="13" font-weight="bold" text-anchor="middle">🐧 Linux Victim (Docker)</text>
  <text x="250" y="235" fill="#8b949e" font-size="11" text-anchor="middle">victim01 · Agent 001 · DockerExecutor</text>

  <rect x="500" y="190" width="300" height="60" rx="8" fill="#161b22" stroke="#d2991d" stroke-width="2"/>
  <text x="650" y="215" fill="#d2991d" font-size="13" font-weight="bold" text-anchor="middle">🪟 Windows Victim (VMware)</text>
  <text x="650" y="235" fill="#8b949e" font-size="11" text-anchor="middle">windows-vm · Agent 002 · SSHExecutor · Sysmon64</text>

  <!-- Canary -->
  <text x="450" y="285" fill="#58a6ff" font-size="14" font-weight="bold" text-anchor="middle">Pipeline Canary 🔒</text>
  <text x="450" y="306" fill="#8b949e" font-size="12" text-anchor="middle">Per-run marker → execute → collect → normalize → match → gate: DETECTED = healthy</text>
</svg>
